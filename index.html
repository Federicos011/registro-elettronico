<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Education Software</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }

        header {
            background-color: #1565c0;
            color: white;
            padding: 15px;
            text-align: center;
        }

        #login {
            max-width: 400px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        #registro {
            display: none;
        }

        nav {
            background-color: #1976d2;
            padding: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        nav button {
            padding: 10px;
            border: none;
            cursor: pointer;
        }

        section {
            background: white;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
        }

        ul {
            padding-left: 20px;
        }

        .sezione {
            display: none;
        }

        #home {
            display: block;
        }

    </style>
</head>

<body>

<header>
    <h1>Education Software</h1>
    <h3>Studente: Giulio Cucinotta</h3>
</header>

<div id="login">

    <h2>Accesso Registro</h2>

    <input
        type="text"
        id="utente"
        placeholder="Utente">

    <br><br>

    <input
        type="password"
        id="password"
        placeholder="Password">

    <br><br>

    <button onclick="accedi()">
        Accedi
    </button>

</div>

<div id="registro">

<nav>

<button onclick="mostraSezione('home')">
🏠 Home
</button>

<button onclick="mostraSezione('profilo')">
👤 Profilo Studente
</button>

<button onclick="mostraSezione('voti')">
📚 Voti
</button>

<button onclick="mostraSezione('grafico')">
📈 Grafico Voti
</button>

<button onclick="mostraSezione('assenze')">
❌ Assenze
</button>

<button onclick="mostraSezione('avvisi')">
📢 Avvisi
</button>

<button onclick="mostraSezione('note')">
📝 Note
</button>

<button onclick="mostraSezione('notifiche')">
🔔 Notifiche
</button>

<button onclick="mostraSezione('ricevimenti')">
👨‍🏫 Ricevimenti
</button>

<button onclick="mostraSezione('scrutinio')">
📋 Scrutinio
</button>

<button onclick="mostraSezione('backup')">
💾 Backup
</button>

<button onclick="logout()">
🚪 Logout
</button>

</nav>

<section
    id="home"
    class="sezione">

<h2>Benvenuto in Education Software</h2>

<p>
Registro elettronico di Giulio Cucinotta.
</p>

</section>

<section
    id="profilo"
    class="sezione">

<h2>👤 Profilo Studente</h2>

<p id="profilo-nome">
Nome: Giulio Cucinotta
</p>

<p id="profilo-media">
Media voti: --
</p>

<p id="profilo-assenze">
Assenze: --
</p>

<p id="profilo-esito">
Esito finale: --
</p>

</section>
